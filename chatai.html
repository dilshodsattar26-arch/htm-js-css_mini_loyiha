<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DilshodbekAi - Demo Version</title>
    <!-- Font Awesome ikonkalari uchun -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #1e1e2e;
            --chat-bg: #27293d;
            --text-color: #ffffff;
            --user-msg-bg: #3b82f6;
            --ai-msg-bg: #44475a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        header {
            padding: 20px;
            background: linear-gradient(90deg, #2b2d42, #1e1e2e);
            border-bottom: 1px solid #333;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 0.7rem;
            background: #2ecc71;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Chat Area */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            font-style: italic;
            color: #aaa;
            font-size: 0.8rem;
            margin-left: 10px;
            display: none;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background-color: #2b2d42;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            outline: none;
            background-color: #1e1e2e;
            color: white;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .attach-btn {
            background-color: transparent;
            color: #aaa;
            font-size: 1.2rem;
        }

        .attach-btn:hover {
            color: white;
            transform: none;
        }

        /* Hidden file input */
        #image-upload {
            display: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><i class="fas fa-robot"></i> DilshodbekAi</div>
        <span class="status-badge">Demo v1.0</span>
    </header>

    <div id="chat-box">
        <!-- Xabarlar shu yerga tushadi -->
        <div class="message ai-message">
            Salom! Men <b>DilshodbekAi</b> demo versiyasiman. Sizga qanday yordam bera olaman? 
            <br><br>
            📍 Joylashuvni tekshirish uchun "Mening joyim" deb yozing.
            <br>
            🖼️ Rasm tahlili uchun pastdagi rasm tugmasini bosing.
        </div>
    </div>

    <div class="typing-indicator" id="typing">DilshodbekAi yozmoqda...</div>

    <div class="input-area">
        <button class="attach-btn" onclick="document.getElementById('image-upload').click()">
            <i class="fas fa-image"></i>
        </button>
        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(this)">
        
        <input type="text" id="user-input" placeholder="Xabar yozing..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing');

    // Enter tugmasini bosganda yuborish
    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // Xabar yuborish funksiyasi
    function sendMessage() {
        const text = userInput.value.trim();
        if (text === "") return;

        // Foydalanuvchi xabarini qo'shish
        addMessage(text, 'user-message');
        userInput.value = '';

        // AI javobini kutish (simulyatsiya)
        showTyping(true);
        setTimeout(() => {
            processAIResponse(text);
            showTyping(false);
        }, 1500);
    }

    // Ekranga xabar qo'shish
    function addMessage(content, className) {
        const div = document.createElement('div');
        div.classList.add('message', className);
        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Yozmoqda indikatori
    function showTyping(show) {
        typingIndicator.style.display = show ? 'block' : 'none';
        if(show) chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Asosiy AI mantiqi (Simulyatsiya)
    function processAIResponse(input) {
        let response = "";
        const lowerInput = input.toLowerCase();

        // 1. Manzilni topish logikasi
        if (lowerInput.includes("manzil") || lowerInput.includes("joy") || lowerInput.includes("qayerda")) {
            getLocation();
            return; // Javob keyinroq keladi
        }

        // 2. Oddiy suhbat logikasi
        else if (lowerInput.includes("salom")) {
            response = "Assalomu alaykum! Men DilshodbekAi yordamchisiman.";
        } else if (lowerInput.includes("isming nima")) {
            response = "Mening ismim DilshodbekAi. Hozircha demo versiyadaman.";
        } else if (lowerInput.includes("qalesan")) {
            response = "Men dasturman, his-tuyg'ularim yo'q, lekin tizimlarim a'lo darajada ishlayapti!";
        } else {
            response = "Kechirasiz, men hali o'rganish jarayonidaman. Iltimos, oddiyroq savollar bering yoki rasm yuklang.";
        }

        addMessage(response, 'ai-message');
    }

    // Geolokatsiya funksiyasi
    function getLocation() {
        if (!navigator.geolocation) {
            addMessage("Brauzeringiz geolokatsiyani qo'llab-quvvatlamaydi.", 'ai-message');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const mapLink = `<a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color:#3b82f6;">Google Xaritada ko'rish</a>`;
                
                addMessage(`📍 Sizning manzilingiz aniqlandi:<br>Lattitude: ${lat.toFixed(4)}<br>Longitude: ${lon.toFixed(4)}<br>${mapLink}`, 'ai-message');
            },
            () => {
                addMessage("⚠️ Joylashuvni aniqlashda xatolik yuz berdi. Iltimos, brauzer ruxsatini tekshiring.", 'ai-message');
            }
        );
    }

    // Rasm yuklash va tahlil qilish (Simulyatsiya)
    function handleImageUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                // Foydalanuvchi rasmni chiqaramiz
                const imgHtml = `<img src="${e.target.result}" style="max-width:100%; border-radius:10px; margin-bottom:5px;">`;
                addMessage(imgHtml + "<br>Rasmni tahlil qilishingizni so'rayman.", 'user-message');

                showTyping(true);

                // 3 soniya o'tib "tahlil" natijasini chiqaramiz
                setTimeout(() => {
                    showTyping(false);
                    const randomAnalysis = [
                        "Bu rasm juda chiroyli ko'rinadi. Unda tabiat manzarasi aks etgan bo'lishi mumkin.",
                        "Tahlil natijasi: Bu rasmda odamlar yoki hayvonlar tasvirlangan bo'lishi ehtimoli yuqori.",
                        "Rasm muvaffaqiyatli qabul qilindi. Sun'iy intellekt obyektlarni aniqlamoqda... Topildi: Ob'ekt, Rang, Shakl."
                    ];
                    const result = randomAnalysis[Math.floor(Math.random() * randomAnalysis.length)];
                    
                    addMessage(`🖼️ <b>Rasm tahlili:</b><br>${result}<br><small>(Eslatma: Bu demo versiya, haqiqiy tahlil uchun server kerak)</small>`, 'ai-message');
                }, 3000);
            }
            
            reader.readAsDataURL(input.files[0]);
            input.value = ''; // Inputni tozalash
        }
    }
</script>

</body>
</html>
