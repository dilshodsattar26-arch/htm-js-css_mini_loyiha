<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>3D Realistik Moshina O'yini</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            user-select: none;
        }
        h1 { margin: 0 0 10px 0; font-size: 20px; color: #ffcc00; }
        p { margin: 5px 0; font-size: 14px; }
        .key {
            display: inline-block;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #555;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

<div id="info">
    <h1>🏎️ Super Drift City</h1>
    <p>Haydash: <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span></p>
    <p>Tezlik: <span id="speed">0</span> km/h</p>
    <p>Ehtiyot bo'ling! Binolarga urilmaslikka harakat qiling.</p>
</div>

<!-- Three.js kutubxonasini ulaymiz -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- O'ZGARUVCHILAR ---
    let scene, camera, renderer;
    let car, carBody, carWheel1, carWheel2, carWheel3, carWheel4;
    let buildings = [];
    
    // Fizika parametrlari
    let speed = 0;
    let angle = 0;
    let acceleration = 0;
    let maxSpeed = 2.5;
    let friction = 0.98;
    let turnSpeed = 0.04;
    
    // Klaviatura holati
    const keys = { w: false, a: false, s: false, d: false };

    // --- SAHNA YARATISH ---
    function init() {
        // 1. Sahna va Kamera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Osmon rangi
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100); // Tuman effekti (realistik ko'rinish uchun)

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, -20);

        // 2. Renderer (Renderni yoqish)
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Soyalarni yoqish
        document.body.appendChild(renderer.domElement);

        // 3. Yorug'lik (Realistiklik uchun)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // 4. Yer (Asfalt)
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 5. Shahar (Binolar yaratish)
        createCity();

        // 6. Moshina yaratish
        createCar();

        // Hodisalar
        window.addEventListener('resize', onWindowResize, false);
        document.addEventListener('keydown', (e) => handleKey(e, true));
        document.addEventListener('keyup', (e) => handleKey(e, false));

        animate();
    }

    function createCity() {
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x888888 });

        for (let i = 0; i < 300; i++) {
            const height = Math.random() * 20 + 5;
            const width = Math.random() * 10 + 5;
            const depth = Math.random() * 10 + 5;
            
            const building = new THREE.Mesh(boxGeo, boxMat);
            building.scale.set(width, height, depth);
            
            // Tasodifiy joylashish (lekin markaz bo'sh qoladi)
            let x = (Math.random() - 0.5) * 800;
            let z = (Math.random() - 0.5) * 800;
            
            if (Math.abs(x) < 30 && Math.abs(z) < 30) continue; // Markazni bo'sh qoldirish

            building.position.set(x, height / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            
            scene.add(building);
            buildings.push(building); // To'qnashuvni tekshirish uchun
        }
    }

    function createCar() {
        car = new THREE.Group();

        // Moshina korpusi (Sport avtomobil shakli)
        const bodyGeo = new THREE.BoxGeometry(2, 0.8, 4.5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.6, roughness: 0.2 }); // Qizil moshina
        carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.position.y = 0.8;
        carBody.castShadow = true;
        car.add(carBody);

        // Tom qismi
        const topGeo = new THREE.BoxGeometry(1.8, 0.6, 2.5);
        const topMat = new THREE.MeshStandardMaterial({ color: 0x222222 }); // Qora tom
        const carTop = new THREE.Mesh(topGeo, topMat);
        carTop.position.y = 1.5;
        carTop.position.z = -0.2;
        carTop.castShadow = true;
        car.add(carTop);

        // G'ildiraklar
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        
        carWheel1 = new THREE.Mesh(wheelGeo, wheelMat);
        carWheel1.rotation.z = Math.PI / 2;
        carWheel1.position.set(1.1, 0.5, 1.5);
        car.add(carWheel1);

        carWheel2 = new THREE.Mesh(wheelGeo, wheelMat);
        carWheel2.rotation.z = Math.PI / 2;
        carWheel2.position.set(-1.1, 0.5, 1.5);
        car.add(carWheel2);

        carWheel3 = new THREE.Mesh(wheelGeo, wheelMat);
        carWheel3.rotation.z = Math.PI / 2;
        carWheel3.position.set(1.1, 0.5, -1.5);
        car.add(carWheel3);

        carWheel4 = new THREE.Mesh(wheelGeo, wheelMat);
        carWheel4.rotation.z = Math.PI / 2;
        carWheel4.position.set(-1.1, 0.5, -1.5);
        car.add(carWheel4);

        scene.add(car);
    }

    // --- BOSHQARUV ---
    function handleKey(e, isPressed) {
        const key = e.key.toLowerCase();
        if (key === 'w' || key === 'arrowup') keys.w = isPressed;
        if (key === 'a' || key === 'arrowleft') keys.a = isPressed;
        if (key === 's' || key === 'arrowdown') keys.s = isPressed;
        if (key === 'd' || key === 'arrowright') keys.d = isPressed;
    }

    function updatePhysics() {
        // Gaz berish
        if (keys.w) {
            acceleration = 0.05;
        } else if (keys.s) {
            acceleration = -0.05;
        } else {
            acceleration = 0;
        }

        speed += acceleration;
        speed *= friction; // Ishqalanish (sekinlashish)

        // Cheklovlar
        if (speed > maxSpeed) speed = maxSpeed;
        if (speed < -maxSpeed / 2) speed = -maxSpeed / 2;

        // Burilish (faqat harakatlanayotganda)
        if (Math.abs(speed) > 0.01) {
            if (keys.a) angle += turnSpeed * Math.sign(speed);
            if (keys.d) angle -= turnSpeed * Math.sign(speed);
        }

        // Pozitsiyani yangilash
        car.rotation.y = angle;
        car.position.x += Math.sin(angle) * speed;
        car.position.z += Math.cos(angle) * speed;

        // Kamera moshinani kuzatishi
        const relativeCameraOffset = new THREE.Vector3(0, 5, -10);
        const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
        
        camera.position.lerp(cameraOffset, 0.1); // Yumshoq harakat
        camera.lookAt(car.position);

        // Tezlikni ekranga chiqarish
        document.getElementById('speed').innerText = Math.abs(Math.round(speed * 80));

        // Oddiy to'qnashuvni tekshirish (Binolar bilan)
        checkCollisions();
    }

    function checkCollisions() {
        // Juda oddiy tekshirish (masofa bo'yicha)
        for (let b of buildings) {
            const dx = car.position.x - b.position.x;
            const dz = car.position.z - b.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            
            if (dist < 5) { // Agar juda yaqin kelsa
                speed = -speed * 0.5; // Orqaga qaytish
                car.position.x -= Math.sin(angle) * 2;
                car.position.z -= Math.cos(angle) * 2;
            }
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        renderer.render(scene, camera);
    }

    // O'yinni ishga tushirish
    init();

</script>
</body>
</html>
